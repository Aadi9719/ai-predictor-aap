<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Predictor</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="container">

<h1>AI Predictor 🔥</h1>

<div id="result">
Prediction Will Show Here
</div>

  <div id="debugBox">

<h3>🧠 AI Debug</h3>

<p>Source :
<span id="debugSource">-</span></p>

<p>Pattern :
<span id="debugPattern">-</span></p>

<p>Memory :
<span id="debugMemory">-</span></p>

<p>Prediction :
<span id="debugPrediction">-</span></p>

  </div>
  
<input type="number" id="n1" placeholder="Last Number 1">

<input type="number" id="n2" placeholder="Last Number 2">

<input type="number" id="n3" placeholder="Last Number 3">

<input type="number" id="n4" placeholder="Last Number 4">

<input type="number" id="n5" placeholder="Last Number 5">

<button id="analyzeBtn">
Analyze AI
</button>

<button id="checkBtn">
Check Result
</button>

  <div id="statsBox">

    <div id="historyBox">

<h2>📜 AI History</h2>

<div id="historyList">

No History

</div>

    </div>
    
<h2>🤖 AI Statistics</h2>

<p>Total Patterns : <span id="totalPatterns">0</span></p>

<p>AI Wins : <span id="wins">0</span></p>

<p>AI Losses : <span id="losses">0</span></p>

<p>Accuracy : <span id="accuracy">0%</span></p>

  </div>
  
<div id="timerBox">
Next Round :
<span id="timer">60</span>
Sec
</div>

</div>

<script src="script.js"></script>
<script src="memory.js"></script>
<script src="pattern.js"></script>
<script src="prediction.js"></script>
<script src="stats.js"></script>
  
</body>
</html>
